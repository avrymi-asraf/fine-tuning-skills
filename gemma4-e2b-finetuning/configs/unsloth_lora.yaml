# Unsloth + LoRA config for Gemma 4 E2B
# Optimized for speed and simplicity on consumer GPUs

model_name: "unsloth/gemma-4-2b-it-bnb-4bit"
max_seq_length: 2048

# LoRA hyperparameters
lora_r: 16
lora_alpha: 16
lora_dropout: 0.0
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj
load_in_4bit: true
use_rslora: false
gradient_checkpointing: "unsloth"

# Training hyperparameters
per_device_train_batch_size: 2
gradient_accumulation_steps: 4
warmup_steps: 5
max_steps: 60
num_train_epochs: null
learning_rate: 2.0e-4
weight_decay: 0.01
lr_scheduler_type: "linear"
save_strategy: "steps"
save_steps: 100
save_total_limit: 3
logging_steps: 1
optim: "adamw_8bit"
seed: 3407
report_to: "none"
